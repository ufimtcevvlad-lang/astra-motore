<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GM SHOP — 7 вариантов (PNG)</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 24px;
        font-family: system-ui, sans-serif;
        background: linear-gradient(145deg, #05070a 0%, #0f172a 50%, #020617 100%);
        color: #e2e8f0;
        min-height: 100vh;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 8px;
        color: #fbbf24;
      }
      p {
        margin: 0 0 24px;
        font-size: 0.875rem;
        color: #94a3b8;
        max-width: 42rem;
      }
      .grid {
        display: grid;
        gap: 20px;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      }
      .card {
        border: 1px solid rgba(251, 191, 36, 0.25);
        border-radius: 12px;
        padding: 16px;
        background: rgba(15, 23, 42, 0.6);
      }
      .card h2 {
        margin: 0 0 12px;
        font-size: 0.75rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #fbbf24;
      }
      .card img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Логотипы GM SHOP (растр PNG)</h1>
    <p>
      Семь вариантов в цветах сайта. Открой через dev-сервер:
      <code style="color: #fbbf24">/brand/logo-gm-raster/preview.html</code>
    </p>
    <div class="grid">
      <div class="card">
        <h2>1 — Круг GS + GM SHOP</h2>
        <img src="./gm-shop-raster-01.png" alt="Вариант 1" width="1200" height="375" />
      </div>
      <div class="card">
        <h2>2 — Квадрат GM + SHOP</h2>
        <img src="./gm-shop-raster-02.png" alt="Вариант 2" width="1200" height="375" />
      </div>
      <div class="card">
        <h2>3 — Шестиугольник</h2>
        <img src="./gm-shop-raster-03.png" alt="Вариант 3" width="1200" height="375" />
      </div>
      <div class="card">
        <h2>4 — Техно-скобки</h2>
        <img src="./gm-shop-raster-04.png" alt="Вариант 4" width="1200" height="375" />
      </div>
      <div class="card">
        <h2>5 — Ступенька типографики</h2>
        <img src="./gm-shop-raster-05.png" alt="Вариант 5" width="1200" height="375" />
      </div>
      <div class="card">
        <h2>6 — Полоса + бейдж</h2>
        <img src="./gm-shop-raster-06.png" alt="Вариант 6" width="1200" height="375" />
      </div>
      <div class="card">
        <h2>7 — Минимал + градиент</h2>
        <img src="./gm-shop-raster-07.png" alt="Вариант 7" width="1200" height="375" />
      </div>
    </div>
  </body>
</html>
